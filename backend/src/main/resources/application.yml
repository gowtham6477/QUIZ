server:
  port: 8080

spring:
  datasource:
    url: ${QUIZ_DB_URL:jdbc:mysql://localhost:3306/quiz}
    username: ${QUIZ_DB_USER:root}
    password: ${QUIZ_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${QUIZ_JWT_SECRET:change-me-to-a-very-long-secret-key-32chars}
    expiration-minutes: 120
  cors:
    allowed-origins: ${QUIZ_CORS_ORIGINS:http://localhost:3000}
